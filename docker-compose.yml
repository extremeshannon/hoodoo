# Hoodoo Alaska — https://github.com/extremeshannon/hoodoo
# Static site via nginx. Public test: http://YOUR_SERVER_IP:8004/
#
# Open firewall on VPS:
#   sudo ufw allow 8004/tcp && sudo ufw reload
# Loopback-only (no public port):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: hoodoo_web
    ports:
      - "8004:80"

networks:
  default:
    name: hoodoo_internal
