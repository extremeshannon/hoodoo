# Hoodoo Alaska — FastAPI + PostgreSQL + static UI (service name: api)
# http://localhost:8004/           → site
# http://localhost:8004/api/health → {"status":"ok"}
#
# If /api/health shows HTML, an old nginx-only container may still own port 8004.
# Run: docker ps   then stop/remove the old web container and: docker compose up -d --build
#
# Local-only bind:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    container_name: hoodoo_db
    environment:
      POSTGRES_USER: hoodoo
      POSTGRES_PASSWORD: hoodoo
      POSTGRES_DB: hoodoo
    volumes:
      - hoodoo_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoodoo -d hoodoo"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: hoodoo_api
    ports:
      - "8004:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://hoodoo:hoodoo@db:5432/hoodoo
      REPO_ROOT: /app
    depends_on:
      db:
        condition: service_healthy

volumes:
  hoodoo_pg:

networks:
  default:
    name: hoodoo_internal
