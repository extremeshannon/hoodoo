server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json text/plain image/svg+xml;

    # Do not SPA-fallback API paths to index.html (avoids "fake" HTML at /api/health).
    location ^~ /api/ {
        default_type text/plain;
        return 404 "No API on this static image. Use docker compose with the `api` service (FastAPI), or open http://localhost:8004/ for the home page only.\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
